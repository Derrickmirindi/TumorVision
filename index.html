<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TumorVision · Brain Tumor Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
<style>
:root{--cols:12;--gutter:24px;--margin:48px;--bl:8px;--lh:24px;--maxw:1200px;--red:#00A344;--green2:#008A3C;--green3:#00C853;--black:#06140C;--white:#FFF;--gray:#4A5D51;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;font-family:'Leelawadee UI','Leelawadee','Segoe UI',Tahoma,Arial,sans-serif;font-size:16px;line-height:var(--lh);color:var(--black);background:var(--white);text-align:left;-webkit-font-smoothing:antialiased;}
.container{max-width:var(--maxw);margin:0 auto;padding:0 var(--margin);display:grid;grid-template-columns:repeat(var(--cols),1fr);gap:var(--gutter);}
.grid-full{grid-column:1 / -1;}
.grid-8{grid-column:span 8;}
.grid-4{grid-column:span 4;}
.grid-3{grid-column:span 3;}
.grid-6{grid-column:span 6;}
.bl{margin-bottom:var(--bl);}
.bl2{margin-bottom:calc(var(--bl) * 2);}
.bl3{margin-bottom:calc(var(--bl) * 3);}
.bl4{margin-bottom:calc(var(--bl) * 4);}
.bl6{margin-bottom:calc(var(--bl) * 6);}
header{padding:calc(var(--bl) * 6) 0 calc(var(--bl) * 3);border-bottom:2px solid var(--red);}
.logo{font-size:48px;font-weight:700;letter-spacing:-0.03em;line-height:1;color:var(--red);margin-bottom:var(--bl);}
.tagline{font-size:18px;line-height:var(--lh);color:var(--gray);max-width:48ch;}
h2{font-size:32px;font-weight:700;line-height:calc(var(--bl) * 5);letter-spacing:-0.02em;margin-bottom:calc(var(--bl) * 2);}
h3{font-size:24px;font-weight:700;line-height:calc(var(--bl) * 4);margin-bottom:var(--bl);}
h4{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;line-height:var(--lh);margin-bottom:var(--bl);}
p{margin-bottom:calc(var(--bl) * 2);}
.modes{display:grid;gap:var(--bl);margin-bottom:calc(var(--bl) * 3);}
.mode-btn{width:100%;text-align:left;background:var(--white);border:2px solid var(--black);color:var(--black);padding:calc(var(--bl) * 2);font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s;}
.mode-btn:hover{background:var(--black);color:var(--white);}
.mode-btn.active{background:var(--red);color:var(--white);border-color:var(--red);}
.drop-zone{border:2px dashed var(--gray);padding:calc(var(--bl) * 6) var(--gutter);text-align:center;cursor:pointer;margin-bottom:calc(var(--bl) * 3);transition:all 0.2s;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--red);background:rgba(0,163,68,0.08);}
.drop-zone strong{color:var(--red);}
.hide{display:none!important;}
.controls{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--gutter);margin-bottom:calc(var(--bl) * 3);}
.control label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gray);margin-bottom:var(--bl);}
input[type=range]{width:100%;height:var(--bl);accent-color:var(--red);}
.btn{border:2px solid var(--black);background:var(--white);color:var(--black);padding:calc(var(--bl) * 2) calc(var(--bl) * 3);font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.05em;}
.btn:hover:not(:disabled){background:var(--black);color:var(--white);}
.btn.primary{background:var(--red);color:var(--white);border-color:var(--red);}
.btn.primary:hover:not(:disabled){background:var(--black);border-color:var(--black);}
.btn:disabled{opacity:0.3;cursor:not-allowed;}
.canvas-wrap{position:relative;width:100%;min-height:400px;border:2px solid var(--black);margin-bottom:calc(var(--bl) * 3);display:flex;align-items:center;justify-content:center;background:var(--black);}
canvas{display:block;max-width:100%;height:auto;}
video{display:none;}
.status{display:flex;align-items:center;gap:calc(var(--bl) * 2);margin-bottom:calc(var(--bl) * 2);padding:calc(var(--bl) * 2);border:2px solid var(--red);}
.status-dot{width:calc(var(--bl) * 2);height:calc(var(--bl) * 2);border-radius:50%;background:var(--gray);}
.status-dot.on{background:var(--green3);box-shadow:0 0 8px var(--green3);}
.status-dot.busy{background:#F59E0B;animation:pulse 1s infinite;}
.status-dot.err{background:var(--black);}
@keyframes pulse{50%{opacity:0.3;}}
.progress{height:var(--bl);background:var(--gray);margin-bottom:calc(var(--bl) * 2);overflow:hidden;}
.progress-bar{height:100%;background:var(--red);width:0;transition:width 0.3s;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gutter);margin-bottom:calc(var(--bl) * 4);}
.stat{border:2px solid var(--black);padding:calc(var(--bl) * 3);}
.stat-v{font-size:48px;font-weight:700;line-height:1;color:var(--red);margin-bottom:var(--bl);}
.stat-k{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gray);}
.detlist{border-top:2px solid var(--black);padding-top:calc(var(--bl) * 2);margin-bottom:calc(var(--bl) * 4);}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:var(--bl) 0;border-bottom:1px solid var(--gray);}
.det-badge{background:var(--red);color:var(--white);padding:calc(var(--bl) / 2) var(--bl);font-size:14px;font-weight:700;letter-spacing:0.05em;}
.disclaimer{border-left:4px solid var(--red);padding-left:calc(var(--bl) * 3);margin-bottom:calc(var(--bl) * 6);color:var(--gray);font-size:14px;line-height:var(--lh);}
.disclaimer strong{color:var(--black);}
footer{border-top:2px solid var(--black);padding:calc(var(--bl) * 4) 0;margin-top:calc(var(--bl) * 6);}
.footer-text{font-size:12px;color:var(--gray);}
@media(max-width:900px){:root{--cols:6;--margin:24px;--gutter:16px;}.grid-8,.grid-4,.grid-3,.grid-6{grid-column:1 / -1;}.stats{grid-template-columns:repeat(2,1fr);}.controls{grid-template-columns:1fr;}}
</style>
</head>
